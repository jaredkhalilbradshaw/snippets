<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rhythm Path proof of concept</title>
  <style>
    :root {
      color-scheme: light dark;
      --paper: light-dark(#f8f6f0, #171916);
      --ink: light-dark(#20211f, #f1f0e9);
      --muted: light-dark(#74766f, #a8aaa2);
      --line: light-dark(#d9d8d0, #3a3d37);
      --accent: light-dark(#667c68, #a4b8a3);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--paper); color: var(--ink); }
    main { width: min(1060px, calc(100% - 40px)); margin: auto; padding: 64px 0; }
    header, .controls { display: flex; align-items: end; justify-content: space-between; gap: 24px; }
    h1 { margin: 6px 0 0; font-size: clamp(36px, 7vw, 68px); letter-spacing: -.055em; }
    .eyebrow, .meta { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .12em; }
    label { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
    .path-viewport { overflow-x: auto; padding: 70px 0 20px; }
    .path { display: flex; min-width: max-content; margin: 0; padding: 0; list-style: none; }
    .node { position: relative; width: 155px; color: var(--muted); text-align: center; }
    .node::before { content: ""; position: absolute; top: 10px; left: 0; width: 100%; border-top: 1px solid var(--line); }
    .node:first-child::before { left: 50%; width: 50%; }
    .node:last-child::before { width: 50%; }
    .marker { position: relative; z-index: 1; width: 21px; height: 21px; margin: 0 auto 18px; border: 2px solid var(--line); border-radius: 50%; background: var(--paper); }
    .node.active { width: 205px; color: var(--accent); }
    .node.active .marker { width: 29px; height: 29px; margin-top: -4px; margin-bottom: 14px; border-color: var(--accent); box-shadow: inset 0 0 0 6px var(--paper), inset 0 0 0 14px var(--accent); }
    .node.done .marker { border-color: var(--accent); background: var(--accent); }
    .node.done strong { text-decoration: line-through; }
    .node.anonymous { width: 58px; opacity: .5; }
    .node.anonymous .marker { width: 11px; height: 11px; margin-top: 5px; }
    .node-text { display: grid; gap: 5px; }
    .node-text strong { font-size: 14px; color: var(--ink); }
    .node-text span { font-size: 11px; }
    .active-card { max-width: 780px; margin: 90px auto 0; padding-top: 28px; border-top: 1px solid var(--line); display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center; }
    .active-card h2 { margin: 7px 0; font-size: 28px; letter-spacing: -.035em; }
    .active-card p { margin: 0; color: var(--muted); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    button { border: 1px solid var(--line); border-radius: 999px; padding: 10px 16px; background: transparent; color: var(--ink); cursor: pointer; }
    button.primary { border-color: var(--accent); background: var(--accent); color: var(--paper); }
    button:disabled { opacity: .4; cursor: default; }
    @media (max-width: 680px) {
      main { padding-top: 38px; }
      header { align-items: start; }
      .path-viewport { overflow: visible; padding-top: 50px; }
      .path { display: grid; min-width: 0; }
      .node, .node.active, .node.anonymous { width: auto; min-height: 74px; display: grid; grid-template-columns: 38px 1fr; text-align: left; }
      .node::before { top: 0; left: 10px !important; width: 0 !important; height: 100%; border-top: 0; border-left: 1px solid var(--line); }
      .node:first-child::before { top: 10px; }
      .node:last-child::before { height: 10px; }
      .marker, .node.active .marker, .node.anonymous .marker { margin: 0; }
      .node-text { align-content: start; }
      .active-card { margin-top: 36px; grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <span class="eyebrow">Progressive-disclosure timeline</span>
        <h1>Rhythm Path</h1>
      </div>
      <label><input id="full-day" type="checkbox"> Show full path</label>
    </header>

    <div class="path-viewport" tabindex="0" aria-label="Scrollable workflow path">
      <ol id="path" class="path"></ol>
    </div>

    <section id="active-card" class="active-card"></section>
  </main>

  <script>
    const items = [
      { id: 1, title: "Outline the launch", detail: "Work · 45 min", status: "done" },
      { id: 2, title: "Draft the first screen", detail: "Work · 50 min", status: "active" },
      { id: 3, title: "Walk to the library", detail: "Move · 20 min", status: "pending" },
      { id: 4, title: "Review interview notes", detail: "Work · 35 min", status: "pending" },
      { id: 5, title: "Reset the kitchen", detail: "Chore · 15 min", status: "pending" },
      { id: 6, title: "Read for a while", detail: "Leisure · 30 min", status: "pending" }
    ];

    const path = document.querySelector("#path");
    const card = document.querySelector("#active-card");
    const fullDay = document.querySelector("#full-day");

    function currentIndex() {
      return items.findIndex(item => item.status === "active" || item.status === "on_hold");
    }

    function advance(outcome) {
      const index = currentIndex();
      if (index < 0) return;
      items[index].status = outcome;
      const next = items.findIndex((item, candidate) => candidate > index && item.status === "pending");
      if (next >= 0) items[next].status = "active";
      render();
    }

    function toggleHold() {
      const index = currentIndex();
      if (index < 0) return;
      items[index].status = items[index].status === "on_hold" ? "active" : "on_hold";
      render();
    }

    function render() {
      const activeIndex = currentIndex();
      const visibleEnd = fullDay.checked ? items.length : activeIndex + 3;
      const visible = items.slice(0, visibleEnd);
      const hiddenNodeCount = fullDay.checked ? 0 : Math.min(3, Math.max(0, items.length - visibleEnd));

      path.innerHTML = visible.map(item => `
        <li class="node ${item.status}">
          <div class="marker" aria-hidden="true"></div>
          <div class="node-text">
            <strong>${item.title}</strong>
            <span>${item.detail}${item.status === "on_hold" ? " · On hold" : ""}</span>
          </div>
        </li>
      `).join("") + Array.from({ length: hiddenNodeCount }, () => `
        <li class="node anonymous" aria-label="Later item hidden"><div class="marker"></div></li>
      `).join("");

      const active = items[activeIndex];
      card.innerHTML = active ? `
        <div>
          <span class="eyebrow">Now</span>
          <h2>${active.title}</h2>
          <p>${active.detail}${active.status === "on_hold" ? " · On hold" : ""}</p>
        </div>
        <div class="actions">
          <button class="primary" data-action="done">Complete</button>
          <button data-action="hold">${active.status === "on_hold" ? "Resume" : "Hold"}</button>
          <button data-action="skipped">Defer</button>
        </div>
      ` : `<div><span class="eyebrow">Path complete</span><h2>Nothing is active.</h2></div>`;
    }

    fullDay.addEventListener("change", render);
    card.addEventListener("click", event => {
      const action = event.target.dataset.action;
      if (action === "hold") toggleHold();
      if (action === "done" || action === "skipped") advance(action);
    });
    render();
  </script>
</body>
</html>
